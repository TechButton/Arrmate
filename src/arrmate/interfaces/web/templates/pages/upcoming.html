{% extends "base.html" %}

{% block title %}Upcoming — Arrmate{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-6 flex items-start justify-between flex-wrap gap-4">
        <div>
            <h1 class="text-3xl font-bold text-white mb-1">Upcoming</h1>
            <p class="text-gray-400">Episodes airing and movies releasing soon</p>
        </div>
    </div>

    <!-- Day-range selector -->
    <div x-data="{ days: 7 }" class="space-y-6">
        <div class="flex items-center gap-2 flex-wrap">
            <span class="text-sm text-gray-400">Show next:</span>
            <template x-for="d in [3, 7, 14, 30]" :key="d">
                <button @click="days = d; htmx.trigger('#upcoming-content', 'refresh')"
                        :class="days === d
                            ? 'bg-primary-600 text-white border-primary-500'
                            : 'bg-gray-800 text-gray-300 border-gray-600 hover:bg-gray-700 hover:text-white'"
                        class="px-3 py-1.5 text-sm rounded-lg border transition-colors"
                        x-text="d + ' days'">
                </button>
            </template>
            <button @click="htmx.trigger('#upcoming-content', 'refresh')"
                    class="ml-auto px-3 py-1.5 text-sm bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-lg transition-colors">
                ↻ Refresh
            </button>
        </div>

        <!-- Hidden input to pass `days` to HTMX -->
        <input type="hidden" name="days" :value="days" id="upcoming-days-input">

        <div id="upcoming-content"
             hx-get="/web/upcoming/content"
             hx-trigger="load, refresh"
             hx-include="#upcoming-days-input"
             hx-swap="innerHTML">
            <div class="flex items-center justify-center py-24 text-gray-500">
                <div class="inline-block w-6 h-6 border-2 border-gray-600 border-t-primary-500 rounded-full animate-spin mr-3"></div>
                Loading calendar…
            </div>
        </div>
    </div>
</div>
{% endblock %}
