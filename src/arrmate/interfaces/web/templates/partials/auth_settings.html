{% if auth_error %}
<div class="mb-4 p-3 rounded-lg bg-red-900/30 border border-red-700/50 text-red-300 text-sm">
    {{ auth_error }}
</div>
{% endif %}

{% if auth_success %}
<div class="mb-4 p-3 rounded-lg bg-green-900/30 border border-green-700/50 text-green-300 text-sm">
    {{ auth_success }}
</div>
{% endif %}

<!-- Multi-user system is active when user_db has users -->
<div class="p-4 bg-primary-900/20 border border-primary-700/30 rounded-lg mb-4">
    <p class="text-primary-300 text-sm font-medium mb-1">Multi-user authentication is active</p>
    <p class="text-gray-400 text-sm">
        Manage users, invite links, and role assignments in the
        <a href="/web/admin" class="text-primary-400 hover:text-primary-300 underline">Admin Panel</a>.
    </p>
</div>
