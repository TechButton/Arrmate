{% if success %}
<div class="w-full text-center text-xs py-1.5 rounded-lg bg-green-900/30 text-green-400 border border-green-800/40"
     title="{{ message }}">
    ✓ Added
</div>
{% else %}
<!-- Show error toast via OOB swap, keep button re-enabled -->
<button hx-post="/web/discover/add"
        hx-vals='{"tmdb_id": {{ tmdb_id | tojson }}, "media_type": {{ media_type | tojson }}, "title": {{ title | tojson }}}'
        hx-target="this"
        hx-swap="outerHTML"
        class="w-full text-xs py-1.5 rounded-lg bg-red-800/60 hover:bg-red-700 text-red-300 transition-colors text-center cursor-pointer font-medium border border-red-700/40"
        title="{{ message }}">
    ✗ Failed — retry?
</button>
<div id="toast-container" hx-swap-oob="beforeend">
    <div class="bg-red-900/90 border border-red-700 text-red-200 text-sm px-4 py-3 rounded-lg shadow-lg pointer-events-auto max-w-sm">
        {{ message }}
    </div>
</div>
{% endif %}
