<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Arrmate - Your AI companion for Sonarr, Radarr, and Lidarr">
    <title>{% block title %}Arrmate{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤝</text></svg>">

    <!-- Tailwind CSS v3.4 -->
    <script src="https://cdn.tailwindcss.com?v=3.4"></script>

    <!-- HTMX v1.9 -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <!-- Alpine.js v3.13 -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/custom.css">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>

    {% block head %}{% endblock %}
</head>
<body class="h-full bg-gray-900 text-gray-100">
    <!-- Navigation -->
    {% include "components/navbar.html" %}

    <!-- Plex Now Playing Strip (polls every 30s, hidden when empty) -->
    <div id="plex-nowplaying"
         hx-get="/web/plex/nowplaying"
         hx-trigger="load, every 30s"
         hx-swap="innerHTML"
         class="fixed top-16 left-0 right-0 z-30">
    </div>

    <!-- Main Content — extra top padding added by JS when now-playing strip is visible -->
    <main id="main-content" class="pt-16 pb-8 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-20 right-4 z-50 space-y-2"></div>

    <!-- HTMX Config -->
    <script>
        document.body.addEventListener('htmx:afterSwap', function(event) {
            if (event.detail.target.id === 'main-content') {
                window.scrollTo(0, 0);
            }
        });

        document.body.addEventListener('htmx:responseError', function(event) {
            const toast = document.createElement('div');
            toast.className = 'toast error';
            toast.textContent = 'Error: ' + (event.detail.error || 'Request failed');
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
